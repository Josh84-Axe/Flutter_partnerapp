name = "wifi-4u-partner"
compatibility_date = "2024-09-23"
pages_build_output_dir = "build/web"

# Serve index.html with no cache to ensure updates are seen immediately
[[headers]]
  pattern = "index.html"
  headers = { "Cache-Control" = "no-cache, no-store, must-revalidate" }

# Serve version.json with no cache
[[headers]]
  pattern = "version.json"
  headers = { "Cache-Control" = "no-cache, no-store, must-revalidate" }

# Let other assets cache normally (they have content hashes)
[[headers]]
  pattern = "assets/*"
  headers = { "Cache-Control" = "public, max-age=31536000, immutable" }
