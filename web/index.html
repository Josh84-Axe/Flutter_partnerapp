<!DOCTYPE html>
<html>

<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="hotspot_partner_app">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <title>hotspot_partner_app</title>
  <link rel="manifest" href="manifest.json">
</head>

<body>
  <!-- ERROR OVERLAY (Added for debugging v1.1.2) -->
  <div id="error-overlay"
    style="display: none; position: fixed; top: 50px; left: 0; width: 100%; height: 100%; background-color: rgba(255, 255, 255, 0.95); z-index: 10000; overflow: auto; padding: 20px; box-sizing: border-box;">
    <h2 style="color: red;">Application Error</h2>
    <p>The application encountered a critical error and could not load.</p>
    <pre id="error-message"
      style="background: #f0f0f0; padding: 10px; border: 1px solid #ccc; color: #333; white-space: pre-wrap; word-wrap: break-word;"></pre>
    <button onclick="window.location.reload()"
      style="padding: 10px 20px; font-size: 16px; margin-top: 20px; cursor: pointer;">Reload Application</button>
  </div>
  <script>
    window.onerror = function (message, source, lineno, colno, error) {
      var overlay = document.getElementById('error-overlay');
      var msgElement = document.getElementById('error-message');
      if (overlay && msgElement) {
        overlay.style.display = 'block';
        msgElement.textContent = "Error: " + message + "\nSource: " + source + ":" + lineno + ":" + colno + "\nStack: " + (error ? error.stack : 'N/A');
      }
      return false; // Let default handler run too
    };

    window.addEventListener('unhandledrejection', function (event) {
      var overlay = document.getElementById('error-overlay');
      var msgElement = document.getElementById('error-message');
      if (overlay && msgElement) {
        overlay.style.display = 'block';
        msgElement.textContent = "Unhandled Promise Rejection: " + event.reason;
      }
    });
  </script>

  <script>
    console.log('🚀 WIFI-4U PARTNER APP - BUILD v1.1.6 - TIMESTAMP: ' + new Date().toISOString());
    window.deferredPrompt = null;

    window.addEventListener('beforeinstallprompt', (e) => {
      // Prevent Chrome 67 and earlier from automatically showing the prompt
      e.preventDefault();
      // Stash the event so it can be triggered later.
      window.deferredPrompt = e;

      // Notify Flutter that the prompt is available
      if (window.onAppInstallable) {
        window.onAppInstallable();
      }
    });

    window.isAppInstallable = function () {
      return window.deferredPrompt !== null;
    };

    window.promptAppInstall = async function () {
      console.log('🚀 Loading Flutter App v1.1.6-fresh...');
      const promptEvent = window.deferredPrompt;
      if (!promptEvent) return false;

      promptEvent.prompt();
      const { outcome } = await promptEvent.userChoice;
      console.log(`User response to the install prompt: ${outcome}`);

      window.deferredPrompt = null;
      return outcome === 'accepted';
    };
  </script>
  <script>
    // Force unregister service workers to fix caching issues
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function (registrations) {
        for (let registration of registrations) {
          registration.unregister();
          console.log('Service Worker unregistered');
        }
      });
    }
  </script>
  <script src="flutter_bootstrap.js?v=1.1.6-fresh" async></script>
</body>

</html>
