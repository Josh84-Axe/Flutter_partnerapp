<html>

<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Tiknet Africa Partner Management App">
  <meta name="theme-color" content="#121212">
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://*.cinetpay.com https://*.paystack.com https://*.paystack.co https://*.gstatic.com https://*.cloudflareinsights.com https://apis.google.com https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://paystack.com https://*.paystack.com https://*.paystack.co; style-src-elem 'self' 'unsafe-inline' https://fonts.googleapis.com https://paystack.com https://*.paystack.com https://*.paystack.co; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://* blob:; frame-src 'self' https://*.paystack.com https://*.paystack.co https://*.cinetpay.com; connect-src 'self' blob: https://debug-check.com https://*.cinetpay.com https://cinetpay.com https://*.paystack.com https://*.paystack.co https://*.tiknetafrica.com https://*.coleah.com https://*.sentry.io https://raw.githubusercontent.com https://*.cloudflareinsights.com https://*.gstatic.com https://cdnjs.cloudflare.com wss://*.cinetpay.com wss://*.paystack.co https://*.posthog.com;">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Tiknet Partner">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="apple-touch-icon" sizes="152x152" href="icons/Icon-192.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/Icon-512.png">
  <link rel="apple-touch-icon" sizes="167x167" href="icons/Icon-192.png">

  <!-- Apple Splash Screens -->
  <link rel="apple-touch-startup-image" href="icons/Icon-512.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <title>Tiknet Partner</title>
  <link rel="manifest" href="manifest.json">

  <!-- Payment SDKs Integration (Documentation Standard) -->
  <script src="https://cdn.cinetpay.com/seamless/main.js" type="text/javascript"></script>
  <script src="https://js.paystack.co/v1/inline.js"></script>
</head>

<body>
  <script>
    // FINAL BUILD v1.1.149 - STABLE GATEWAY RELEASE
    const targetVersion = '1.1.149';
    console.log('🚀 WIFI-4U PARTNER APP - BUILD ' + targetVersion + ' (STABLE GATEWAY)');
    
    // Global helper for CinetPay official SDK launch
    window.launchCinetPay = function(config) {
      if (!window.CinetPay) {
        alert("CinetPay SDK not loaded! Please check your internet connection.");
        return;
      }
      try {
        CinetPay.setConfig({
          apikey: config.apiKey, site_id: config.siteId, notify_url: config.notifyUrl, mode: 'PRODUCTION'
        });
        
        CinetPay.getCheckout({
          transaction_id: config.transactionId, amount: config.amount, currency: config.currency,
          channels: 'ALL', description: config.description, customer_name: config.customerName,
          customer_surname: config.customerSurname, customer_email: config.customerEmail,
          customer_phone_number: config.customerPhoneNumber, customer_address: "Abidjan",
          customer_city: "Abidjan", customer_country: "CI", customer_state: "CI",
          customer_zip_code: "00225", return_url: config.returnUrl, wait_response: true
        });

        CinetPay.waitResponse(function(data) {
           console.log('CinetPay Response:', data);
           if (data.status == "ACCEPTED") {
              if (window.onPaymentSuccess) window.onPaymentSuccess(config.transactionId);
           } else {
              if (window.onPaymentError) window.onPaymentError(data);
           }
        });

        CinetPay.onError(function(data) {
          console.error('CinetPay Error:', data);
          if (window.onPaymentError) window.onPaymentError(data);
        });

        CinetPay.onClose(function(data) {
          console.log('CinetPay Portal Closed');
          if (window.onPaymentError) window.onPaymentError({message: "closed"});
        });
      } catch (e) {
        console.error('CinetPay Launch Error:', e);
      }
    };

    // Global helper for Paystack SDK launch
    window.launchPaystack = function (config) {
      if (!window.PaystackPop) {
        alert("Paystack SDK not loaded! Please check your internet connection.");
        return;
      }
      try {
        const handler = PaystackPop.setup({
          key: config.key, email: config.email, amount: config.amount, currency: config.currency, ref: config.ref,
          metadata: {
            custom_fields: [
              { display_name: "Plan ID", variable_name: "plan_id", value: config.planId },
              { display_name: "Plan Name", variable_name: "plan_name", value: config.planName }
            ]
          },
          callback: function (response) {
            console.log('✅ Paystack Success:', response);
            if (window.onPaystackSuccess) window.onPaystackSuccess(response.reference);
          },
          onClose: function () {
            console.log('⚠️ Paystack Closed');
            if (window.onPaystackCancel) window.onPaystackCancel();
          }
        });
        handler.openIframe();
      } catch (e) {
        console.error('Paystack Launch Error:', e);
      }
    };

    // Standalone and Version Management
    if (localStorage.getItem('last_version') !== targetVersion) {
      console.warn('🧹 [Update] Version mismatch! Hard Resetting...');
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(registrations => {
          for (let r of registrations) r.unregister();
        });
      }
      if ('caches' in window) {
        caches.keys().then(names => {
          for (let name of names) caches.delete(name);
        });
      }
      localStorage.clear();
      localStorage.setItem('last_version', targetVersion);
      setTimeout(() => { window.location.reload(); }, 200);
    }
    
    window.appVersion = targetVersion;
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('service-worker.js').then(function (reg) {
          console.log('✅ ServiceWorker enabled');
        });
      });
    }
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>

</html>
