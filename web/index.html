<!DOCTYPE html>
<html>

<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Tiknet Africa Partner Management App">
  <meta name="theme-color" content="#121212">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Tiknet Partner">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="apple-touch-icon" sizes="152x152" href="icons/Icon-192.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/Icon-512.png">
  <link rel="apple-touch-icon" sizes="167x167" href="icons/Icon-192.png">

  <!-- Apple Splash Screens -->
  <link rel="apple-touch-startup-image" href="icons/Icon-512.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <title>Tiknet Partner</title>
  <link rel="manifest" href="manifest.json?v=1.1.10-fresh">
</head>

<body>
  <script>
    console.log('🚀 WIFI-4U PARTNER APP - BUILD v1.1.10 - TIMESTAMP: ' + new Date().toISOString());
    window.deferredPrompt = null;

    // Register Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('service-worker.js?v=1.1.10-fresh').then(function (registration) {
          console.log('✅ ServiceWorker registration successful with scope: ', registration.scope);
        }, function (err) {
          console.log('❌ ServiceWorker registration failed: ', err);
        });
      });
    }

    window.addEventListener('beforeinstallprompt', (e) => {
      // Prevent Chrome 67 and earlier from automatically showing the prompt
      e.preventDefault();
      // Stash the event so it can be triggered later.
      window.deferredPrompt = e;

      // Notify Flutter that the prompt is available
      if (window.onAppInstallable) {
        window.onAppInstallable();
      }
    });

    window.addEventListener('appinstalled', (e) => {
      console.log('✅ PWA was installed');
      window.deferredPrompt = null;
      if (window.onAppInstalled) {
        window.onAppInstalled();
      }
    });

    window.isAppInstallable = function () {
      return window.deferredPrompt !== null;
    };

    window.isInstallPromptSupported = function () {
      return 'BeforeInstallPromptEvent' in window || (window.deferredPrompt !== null);
    };

    window.isStandalone = function () {
      const urlParams = new URLSearchParams(window.location.search);
      const isSourcePwa = urlParams.get('source') === 'pwa';
      const isStandaloneMode = (window.matchMedia('(display-mode: standalone)').matches) ||
        (window.matchMedia('(display-mode: minimal-ui)').matches) ||
        (window.matchMedia('(display-mode: fullscreen)').matches) ||
        (window.navigator.standalone) ||
        false;
      return isSourcePwa || isStandaloneMode;
    };

    window.promptAppInstall = async function () {
      console.log('🚀 Triggering PWA Install Prompt...');
      const promptEvent = window.deferredPrompt;
      if (!promptEvent) {
        console.warn('⚠️ No deferredPrompt available');
        return false;
      }

      try {
        await promptEvent.prompt();
        const { outcome } = await promptEvent.userChoice;
        console.log(`User response to the install prompt: ${outcome}`);
        window.deferredPrompt = null;
        return outcome === 'accepted';
      } catch (err) {
        console.error('❌ Error during prompt:', err);
        return false;
      }
    };
  </script>
  <script src="flutter_bootstrap.js?v=1.1.10" async></script>
</body>

</html>
