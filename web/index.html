<body>
  <script>
    // BUILD v1.1.35 - DO NOT REMOVE THIS LINE
    console.log('🚀 WIFI-4U PARTNER APP - BUILD v1.1.35 - TIMESTAMP: ' + new Date().toISOString());
    window.deferredPrompt = null;

    // Stable Service Worker registration
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        // We use a clean URL to avoid infinite install loops. 
        // Browsers check for updates automatically on script content change.
        navigator.serviceWorker.register('service-worker.js').then(function (registration) {
          console.log('✅ ServiceWorker registered');

          // Detect new service worker versions
          registration.onupdatefound = () => {
            const installingWorker = registration.installing;
            if (installingWorker == null) return;
            
            installingWorker.onstatechange = () => {
              if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  // A new version is available on the server and has been installed locally.
                  // We activate it immediately.
                  console.log('🔄 New version ready. Activating...');
                  installingWorker.postMessage({ type: 'SKIP_WAITING' });
                }
            };
          };
        }).catch(function (err) {
          console.log('❌ ServiceWorker registration failed: ', err);
        });

        let refreshing = false;
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          if (refreshing) return;
          console.log('🔄 Controller changed, refreshing page...');
          window.location.reload();
          refreshing = true;
        });
      });
    }

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      window.deferredPrompt = e;
      if (window.onAppInstallable) window.onAppInstallable();
    });

    window.addEventListener('appinstalled', () => {
      window.deferredPrompt = null;
      if (window.onAppInstalled) window.onAppInstalled();
    });

    window.isAppInstallable = function () { return window.deferredPrompt !== null; };
    window.isInstallPromptSupported = function () { return 'BeforeInstallPromptEvent' in window || (window.deferredPrompt !== null); };
    window.isStandalone = function () {
      return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
    };
  </script>
