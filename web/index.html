<!DOCTYPE html>
<html>

<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="hotspot_partner_app">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <title>hotspot_partner_app</title>
  <link rel="manifest" href="manifest.json">
</head>

<body>
  <div id="debug-banner"
    style="position: fixed; top: 0; left: 0; width: 100%; background-color: #0000FF; color: white; text-align: center; padding: 10px; z-index: 9999; font-weight: bold;">
    FRESH DEPLOYMENT: v1.1.1 (dev-fresh-fixed)
  </div>
  <script>
    console.log('🚀 WIFI-4U PARTNER APP - BUILD v1.0.8 - TIMESTAMP: ' + new Date().toISOString());
    window.deferredPrompt = null;

    window.addEventListener('beforeinstallprompt', (e) => {
      // Prevent Chrome 67 and earlier from automatically showing the prompt
      e.preventDefault();
      // Stash the event so it can be triggered later.
      window.deferredPrompt = e;

      // Notify Flutter that the prompt is available
      if (window.onAppInstallable) {
        window.onAppInstallable();
      }
    });

    window.isAppInstallable = function () {
      return window.deferredPrompt !== null;
    };

    window.promptAppInstall = async function () {
      const promptEvent = window.deferredPrompt;
      if (!promptEvent) return false;

      promptEvent.prompt();
      const { outcome } = await promptEvent.userChoice;
      console.log(`User response to the install prompt: ${outcome}`);

      window.deferredPrompt = null;
      return outcome === 'accepted';
    };
  </script>
  <script>
    // Force unregister service workers to fix caching issues
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function (registrations) {
        for (let registration of registrations) {
          registration.unregister();
          console.log('Service Worker unregistered');
        }
      });
    }
  </script>
  <script src="flutter_bootstrap.js?v=1.1.1-fresh" async></script>
</body>

</html>
