<body>
  <script>
    // BUILD v1.1.61 - FORCE ATOMIC CACHE CLEAR
    console.log('🚀 WIFI-4U PARTNER APP - BUILD v1.1.61 - TIMESTAMP: ' + new Date().toISOString());
    const targetVersion = '1.1.61';
    
    // Nuke caches on version mismatch to escape the PWA sticky cache trap
    if ('serviceWorker' in navigator && localStorage.getItem('last_app_version') !== targetVersion) {
      console.log('🧹 [Atomic Clear] Version mismatch! Purging all caches and service workers...');
      navigator.serviceWorker.getRegistrations().then(registrations => {
        for (let registration of registrations) {
          registration.unregister();
        }
      });
      if ('caches' in window) {
        caches.keys().then(names => {
          for (let name of names) caches.delete(name);
        });
      }
    }
    window.appVersion = targetVersion;
    window.deferredPrompt = null;

    // Stable Service Worker registration
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('service-worker.js').then(function (registration) {
          console.log('✅ ServiceWorker registered');

          registration.onupdatefound = () => {
            const installingWorker = registration.installing;
            if (installingWorker == null) return;
            
            installingWorker.onstatechange = () => {
              if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  console.log('🔄 New version ready. Please refresh to update.');
                  // We no longer auto-reload to avoid loops in some environments
                }
            };
          };
        }).catch(function (err) {
          console.log('❌ ServiceWorker registration failed: ', err);
        });

        // Simplified controller change listener without auto-reload
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          console.log('🔄 Controller changed (New Service Worker active)');
        });
      });
    }

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      window.deferredPrompt = e;
      if (window.onAppInstallable) window.onAppInstallable();
    });

    window.addEventListener('appinstalled', () => {
      window.deferredPrompt = null;
      if (window.onAppInstalled) window.onAppInstalled();
    });

    window.isAppInstallable = function () { return window.deferredPrompt !== null; };
    window.isInstallPromptSupported = function () { return 'BeforeInstallPromptEvent' in window || (window.deferredPrompt !== null); };
    window.isStandalone = function () {
      return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
    };
  </script>
  <script src="flutter_bootstrap.js" async></script>
