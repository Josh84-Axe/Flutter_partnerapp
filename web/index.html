<!DOCTYPE html>
<html>

<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Tiknet Africa Partner Management App">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Tiknet Partner">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <title>Tiknet Partner</title>
  <link rel="manifest" href="manifest.json?v=1.1.10-fresh">
</head>

<body>
  <script>
    console.log('🚀 WIFI-4U PARTNER APP - BUILD v1.1.10 - TIMESTAMP: ' + new Date().toISOString());
    window.deferredPrompt = null;

    window.addEventListener('beforeinstallprompt', (e) => {
      // Prevent Chrome 67 and earlier from automatically showing the prompt
      e.preventDefault();
      // Stash the event so it can be triggered later.
      window.deferredPrompt = e;

      // Notify Flutter that the prompt is available
      if (window.onAppInstallable) {
        window.onAppInstallable();
      }
    });

    window.isAppInstallable = function () {
      return window.deferredPrompt !== null;
    };

    window.promptAppInstall = async function () {
      console.log('🚀 Triggering PWA Install Prompt...');
      const promptEvent = window.deferredPrompt;
      if (!promptEvent) return false;

      promptEvent.prompt();
      const { outcome } = await promptEvent.userChoice;
      console.log(`User response to the install prompt: ${outcome}`);

      window.deferredPrompt = null;
      return outcome === 'accepted';
    };
  </script>
  <script src="flutter_bootstrap.js?v=1.1.10-fresh" async></script>
</body>

</html>
