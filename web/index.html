<!DOCTYPE html>
<html>

<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Tiknet Africa Partner Management App">
  <meta name="theme-color" content="#121212">
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.gstatic.com https://apis.google.com https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://*; connect-src 'self' https://www.gstatic.com https://fonts.gstatic.com https://api.tiknetafrica.com https://api.coleah.com https://*.sentry.io https://cloudflareinsights.com;">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Tiknet Partner">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="apple-touch-icon" sizes="152x152" href="icons/Icon-192.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/Icon-512.png">
  <link rel="apple-touch-icon" sizes="167x167" href="icons/Icon-192.png">

  <!-- Apple Splash Screens -->
  <link rel="apple-touch-startup-image" href="icons/Icon-512.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <!-- Prevent caching of index.html -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <title>Tiknet Partner</title>
  <!-- DEPLOY_VERIFICATION_TAG_2145Z -->
  <link id="pwa-manifest" rel="manifest" href="manifest.json">
  <script>
    // Dynamically update manifest version to bust cache
    document.getElementById('pwa-manifest').setAttribute('href', 'manifest.json?v=' + new Date().getTime());
  </script>
</head>

<body>
  <script>
    console.log('🚀 WIFI-4U PARTNER APP - TIMESTAMP: ' + new Date().toISOString());
    window.deferredPrompt = null;

    // Register Service Worker with enhanced update detection
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        // Use a timestamp to bypass browser cache for service-worker.js
        const swUrl = 'service-worker.js?v=' + new Date().getTime();
        
        navigator.serviceWorker.register(swUrl).then(function (registration) {
          console.log('✅ ServiceWorker registration successful');

          // Check for updates
          registration.onupdatefound = () => {
            const installingWorker = registration.installing;
            if (installingWorker == null) return;
            
            installingWorker.onstatechange = () => {
              if (installingWorker.state === 'installed') {
                if (navigator.serviceWorker.controller) {
                  // A new version is ready, activate it immediately
                  console.log('🔄 New version found! Activating automatically...');
                  installingWorker.postMessage({ type: 'SKIP_WAITING' });
                } else {
                  console.log('📦 Content cached for offline use.');
                }
              }
            };
          };
        }, function (err) {
          console.log('❌ ServiceWorker registration failed: ', err);
        });

        let refreshing = false;
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          if (refreshing) return;
          console.log('🔄 Version updated! Reloading application...');
          window.location.reload();
          refreshing = true;
        });
      });
    }

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      window.deferredPrompt = e;
      if (window.onAppInstallable) window.onAppInstallable();
    });

    window.addEventListener('appinstalled', (e) => {
      console.log('✅ PWA was installed');
      window.deferredPrompt = null;
      if (window.onAppInstalled) window.onAppInstalled();
    });

    window.isAppInstallable = function () { return window.deferredPrompt !== null; };
    window.isInstallPromptSupported = function () { return 'BeforeInstallPromptEvent' in window || (window.deferredPrompt !== null); };
    window.isStandalone = function () {
      const urlParams = new URLSearchParams(window.location.search);
      return urlParams.get('source') === 'pwa' || window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
    };

    window.promptAppInstall = async function () {
      const promptEvent = window.deferredPrompt;
      if (!promptEvent) return false;
      try {
        await promptEvent.prompt();
        const { outcome } = await promptEvent.userChoice;
        window.deferredPrompt = null;
        return outcome === 'accepted';
      } catch (err) {
        return false;
      }
    };
  </script>
  <script>
    // Load flutter_bootstrap.js with cache busting
    document.write('<script src="flutter_bootstrap.js?v=' + new Date().getTime() + '" async><\/script>');
  </script>
</body>

</html>
